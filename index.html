<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Realistic Highway Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="arcade-cabinet">
    <div class="ui-bar">
      <div class="stat-box">SPEED: <span id="speed-val">0</span> MPH</div>
      <div class="stat-box">SCORE: <span id="score-val">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls-overlay" id="over-screen">
      <h1 id="main-title">HIGHWAY CRUISE</h1>
      <p id="sub-title">PRESS SPACEBAR OR ENTER TO DRIVE</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
